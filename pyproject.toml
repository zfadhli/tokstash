[project]
name = "tokstash"
version = "1.0.0"
description = "Download and stash TikTok livestreams with auto-monitoring"
requires-python = ">=3.12"
dependencies = [
    "click>=8.0",
    "curl-cffi>=0.14.0",
    "pydantic>=2.0",
    "python-telegram-bot>=22.7",
]

[project.scripts]
tokstash = "tokstash.cli:main"

[tool.uv]
package = true

[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = [
    "mypy>=2.1.0",
    "pytest>=9.0.3",
    "python-semantic-release>=10.5.3",
    "ruff>=0.15.13",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.semantic_release]
version_toml = [
    "pyproject.toml:project.version",
]
branch = "main"
commit_parser = "conventional"
commit_message_token = "chore"
commit_message_overwrite = "{version}\n\nAutomatically generated by python-semantic-release\n"

# Keep 0.x semver: only bump minor on breaking changes
major_on_zero = false

[tool.semantic_release.changelog]
[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"

[tool.semantic_release.remote]
token = { env = "GH_TOKEN" }

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.format]
quote-style = "double"
